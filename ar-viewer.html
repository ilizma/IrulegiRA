<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irulegi - AR</title>
    
    <link rel="stylesheet" href="ar-style.css?v=4.0">
    
    <!-- A-Frame first -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div id="custom-loader">
        <div class="spinner"></div>
        <p id="loader-text">Preparando experiencia... / Experientzia prestatzen...</p>
        <div id="loader-subtext" style="font-size: 12px; margin-top: 10px; opacity: 0.7;"></div>
    </div>

    <div class="ui-overlay">
        <a href="index.html" class="back-btn" id="btn-back">✕</a>
        <div class="scanning-hint" id="hint-text">Apunta con la cámara a la maqueta / Zuzendu kamera modeloari</div>
    </div>

    <a-scene 
        id="ar-scene"
        mindar-image="autoStart: false; uiScanning: #hint-text; uiLoading: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="model-asset" src=""></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="example-target" mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="ar-model"
                src="#model-asset" 
                rotation="0 0 0" 
                position="0 0 0" 
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const modelId = params.get('model') || 'fort';

            document.getElementById('btn-back').href = 'index.html';

            const models = {
                'fort': { glb: 'models/fort.glb', mind: 'mind/targets_fort.mind' },
                'castle': { glb: 'models/castle.glb', mind: 'mind/targets_castle.mind' }
            };

            const data = models[modelId];
            const sceneEl = document.getElementById('ar-scene');
            const loader = document.getElementById('custom-loader');
            const loaderText = document.getElementById('loader-text');
            const loaderSubtext = document.getElementById('loader-subtext');

            // Configure MindAR attributes (use autoStart: true)
            sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./${data.mind}; autoStart: true; uiScanning: #hint-text; uiLoading: no;`);
            document.getElementById('model-asset').setAttribute('src', data.glb);
            
            if (modelId === 'fort') {
                document.getElementById('ar-model').setAttribute('scale', '0.05 0.05 0.05');
            }

            const startExperience = async () => {
                try {
                    loaderSubtext.innerText = "Cargando motor de visión... / Ikusmen motorra kargatzen...";
                    
                    // Wait for the system to be available
                    const checkSystem = () => {
                        return sceneEl.systems && sceneEl.systems['mindar-image-system'];
                    };

                    let attempts = 0;
                    while (!checkSystem() && attempts < 20) {
                        await new Promise(r => setTimeout(r, 250));
                        attempts++;
                    }

                    const mindarSystem = sceneEl.systems['mindar-image-system'];
                    if (!mindarSystem) {
                        throw new Error("Sistema MindAR no registrado. Comprueba tu conexión. / MindAR sistema erregistratu gabe. Zure konexioa egiaztatu.");
                    }

                    loaderText.innerText = "Cámara activada / Kamera aktibatuta";
                    loaderSubtext.innerText = "Solicitando permisos... / Baimenak eskatzen...";
                    
                    // Start the system
                    await mindarSystem.start();
                    
                    loader.style.transition = "opacity 0.5s";
                    loader.style.opacity = "0";
                    setTimeout(() => loader.style.display = 'none', 500);
                } catch (err) {
                    console.error("AR Error:", err);
                    loaderText.innerText = "Vaya, algo ha fallado / Ai ene, zerbait gaizki joan da";
                    loaderSubtext.innerHTML = `${err.message}<br><br><button onclick="location.reload()" class="retry-btn">REINTENTAR / BERRIRO SAIATU</button>`;
                }
            };

            // Start the experience when the scene is loaded
            if (sceneEl.hasLoaded) {
                startExperience();
            } else {
                sceneEl.addEventListener('loaded', startExperience);
            }
        });
    </script>
</body>
</html>
