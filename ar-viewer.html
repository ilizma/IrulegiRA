<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irulegi - Visor AR (MindAR)</title>
    
    <link rel="stylesheet" href="ar-style.css?v=1.0">
    
    <!-- MindAR and A-Frame libraries -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div class="ui-overlay">
        <a href="index.html" class="back-btn" id="btn-back">✕</a>
        <div id="debug-log" style="position: fixed; bottom: 80px; left: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; z-index: 2000; max-height: 100px; overflow-y: auto; pointer-events: none; display: none;"></div>
        <div class="scanning-hint" id="hint-text">Apunta con la cámara al marcador de la maqueta</div>
    </div>

    <!-- A-Frame scene with MindAR -->
    <!-- Note: The “targets.mind” file must be generated using the images from your model -->
    <a-scene 
        id="ar-scene"
        mindar-image="autoStart: true; uiScanning: #hint-text;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- The models will be loaded dynamically -->
            <a-asset-item id="model-asset" src=""></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <!-- The model will appear on target 0 (the first image you compile in the .mind file) -->
        <a-entity id="example-target" mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="ar-model"
                src="#model-asset" 
                rotation="0 0 0" 
                position="0 0 0" 
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        window.onerror = (msg, url, line) => {
            return false;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const modelId = params.get('model');
            const backUrl = params.get('from') || 'index.html';
            
            document.getElementById('btn-back').href = backUrl;

            const models = {
                'fort': { glb: 'models/edificio1.glb', mind: 'targets_fort.mind' },
                'castle': { glb: 'models/edificio2.glb', mind: 'targets_castle.mind' }
            };

            const data = models[modelId] || models['fort'];
            
            // Configure the .mind file dynamically before MindAR starts
            const sceneEl = document.getElementById('ar-scene');
            sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./${data.mind}; autoStart: true; uiScanning: #hint-text;`);

            // Update the GLB model
            const asset = document.getElementById('model-asset');
            asset.setAttribute('src', data.glb);

            // Optional: Specific adjustments based on the model
            const modelEntity = document.getElementById('ar-model');
            if (modelId === 'fort') {
                modelEntity.setAttribute('scale', '0.05 0.05 0.05');
            } else {
                modelEntity.setAttribute('scale', '0.1 0.1 0.1');
            }
        });

        const sceneEl = document.querySelector('a-scene');
    </script>
</body>
</html>
